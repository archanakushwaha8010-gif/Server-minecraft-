services:
  - type: worker
    name: mc-bedrock
    env: docker
    dockerfilePath: ./Dockerfile
    plan: scale
    disk:
      name: bedrock-world
      mountPath: /data
      sizeGB: 10
    envVars:
      - key: EULA
        value: "TRUE"
      - key: VERSION
        value: "1.21.3"
      - key: VIEW_DISTANCE
        value: "16"
      - key: SERVER_NAME
        value: "Mera Bedrock Server"
      - key: MEMORY
        value: "4G"
      - key: ENABLE_WHITELIST
        value: "true"   # baad mein true kar dena
